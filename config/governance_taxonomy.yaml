# ---------------------------------------------------------------------------
# Governance Keyword Detection
# Any posting mentioning one or more of these terms is considered "governance-aware".
# A posting with is_ai_role=True AND touches_high_risk_domain=True AND
# governance_keyword_count=0 has the "governance_gap" flag set to True.
# ---------------------------------------------------------------------------
governance_keywords:
  # Regulatory / Legal References
  - "responsible ai"
  - "ai ethics"
  - "ai governance"
  - "eu ai act"
  - "ai regulation"
  - "ai compliance"
  - "ai act"
  - "gdpr"
  - "data protection"
  - "conformity assessment"
  - "ce marking"
  - "regulatory compliance"

  # Technical Safeguards
  - "bias testing"
  - "fairness testing"
  - "bias mitigation"
  - "algorithmic fairness"
  - "human oversight"
  - "human-in-the-loop"
  - "hitl"
  - "human review"
  - "algorithmic accountability"
  - "ai audit"
  - "model monitoring"
  - "model governance"
  - "ai transparency"
  - "explainable ai"
  - "xai"
  - "interpretability"
  - "model explainability"
  - "ai safety"
  - "trustworthy ai"
  - "ai risk"
  - "risk management system"

  # Organizational / Process
  - "ai policy"
  - "data ethics"
  - "ethics board"
  - "ethics review"
  - "privacy by design"
  - "fundamental rights"
  - "impact assessment"
  - "dpia"
  - "data minimization"
  - "consent management"
  - "model card"
  - "model documentation"
  - "ai documentation"
  - "system card"

