      - "utility management"

  Administration_of_Justice:
    annex_iii_section: "Section 8"
    annex_iii_title: "Administration of justice and democratic processes"
    articles_triggered: [9, 10, 11, 13, 14, 15]
    keywords:
      - "legal ai"
      - "court decision"
      - "judicial"
      - "sentencing"
      - "legal document analysis"
      - "case outcome prediction"
      - "election"
