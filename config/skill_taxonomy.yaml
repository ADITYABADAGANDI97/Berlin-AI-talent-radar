# =============================================================================
# Berlin AI Talent Radar — Skill Taxonomy
# =============================================================================
# 73 skills across 8 categories. Each skill has a canonical name, category,
# and a list of regex patterns (applied case-insensitively with word boundaries).
#
# Adding a new skill: add a new key under the appropriate category, give it
# patterns, and it will be automatically picked up by skill_extractor.py.
# =============================================================================

# ---------------------------------------------------------------------------
# Category 1: Programming Languages (10 skills)
# ---------------------------------------------------------------------------
python:
  category: "Programming Languages"
  patterns:
    - "\\bpython\\b"
    - "\\bpython3\\b"
    - "\\bpy\\b"

sql:
  category: "Programming Languages"
  patterns:
    - "\\bsql\\b"
    - "\\bplsql\\b"
    - "\\bpl/sql\\b"
    - "\\bt-sql\\b"
    - "\\btsql\\b"

typescript:
  category: "Programming Languages"
  patterns:
    - "\\btypescript\\b"
    - "\\bts\\b(?=\\s+developer|\\s+engineer)"

javascript:
  category: "Programming Languages"
  patterns:
    - "\\bjavascript\\b"
    - "\\bjs\\b(?=\\s+developer|\\s+engineer)"
    - "\\bnode\\.?js\\b"
    - "\\bnodejs\\b"

java:
  category: "Programming Languages"
  patterns:
    - "\\bjava\\b(?!script)"
    - "\\bspring\\s+boot\\b"
    - "\\bjvm\\b"

scala:
  category: "Programming Languages"
  patterns:
    - "\\bscala\\b"
    - "\\bplay\\s+framework\\b"

go:
  category: "Programming Languages"
  patterns:
    - "\\bgolang\\b"
    - "\\bgo\\s+lang\\b"
    - "\\bgo\\s+programming\\b"
    - "\\bgo\\s+developer\\b"
    - "\\bgo\\s+engineer\\b"

rust:
  category: "Programming Languages"
  patterns:
    - "\\brust\\b(?=\\s+programming|\\s+developer|\\s+engineer|\\s+lang)"
    - "\\brust\\s+lang\\b"

r_lang:
  category: "Programming Languages"
  patterns:
    - "\\br\\s+programming\\b"
    - "\\br\\s+language\\b"
    - "\\brstudio\\b"
    - "\\bggplot\\b"
    - "\\btidyverse\\b"
    - "\\bdplyr\\b"
    - "\\br\\s+(?:for\\s+)?data\\s+science\\b"

cpp:
  category: "Programming Languages"
  patterns:
    - "\\bc\\+\\+\\b"
    - "\\bcpp\\b"
    - "\\bc/c\\+\\+\\b"

